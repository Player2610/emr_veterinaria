services:
  postgres:
    image: postgres:16-alpine
    container_name: emr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: emr
      POSTGRES_PASSWORD: emr_dev_password
      POSTGRES_DB: emr_veterinaria
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U emr -d emr_veterinaria']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: emr_redis
    restart: unless-stopped
    command: redis-server --requirepass emr_redis_password --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'emr_redis_password', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # MinIO como reemplazo local de S3/R2
  minio:
    image: minio/minio:latest
    container_name: emr_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: emr_minio
      MINIO_ROOT_PASSWORD: emr_minio_password
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  # Mailhog — SMTP local para capturar emails en dev
  mailhog:
    image: mailhog/mailhog:latest
    container_name: emr_mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: emr_network
